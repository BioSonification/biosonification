[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--verbose",
    "--strict-markers",
    "--cov=bio_music_pipeline",
    "--cov=web",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-report=xml",
    "--cov-fail-under=50",  # Current: 54%, Target: 70% (work in progress)
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "gpu: marks tests that require GPU",
    "integration: marks tests as integration tests",
    "web: marks tests for web application",
]

[tool.coverage.run]
source = ["bio_music_pipeline", "web"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/site-packages/*",
    "*/test_*.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.black]
line-length = 120
target-version = ['py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  \.git
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.mypy]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "bio_music_pipeline.v2.bio",
    "bio_music_pipeline.v2.corpus",
    "bio_music_pipeline.v2.dataset_report",
    "bio_music_pipeline.v2.evaluate",
    "bio_music_pipeline.v2.structured_music",
    "bio_music_pipeline.v2.structured_pairing",
    "bio_music_pipeline.v2.structured_train",
    "web.generator",
]
ignore_errors = true
